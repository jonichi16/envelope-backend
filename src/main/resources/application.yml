spring:
  application:
    name: envelope
  profiles:
    active: "${ENV}"
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: "${JWT_SECRET_KEY}"

server:
  error:
    include-message: always