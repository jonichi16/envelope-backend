spring:
  application:
    name: envelope
  profiles:
    active: "${ENV}"
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
  jackson:
    deserialization:
      fail-on-unknown-properties: true

jwt:
  secret: "${JWT_SECRET_KEY}"

server:
  error:
    include-message: always